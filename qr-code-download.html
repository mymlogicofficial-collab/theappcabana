<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 60px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    #qrcode {
      margin: 20px auto;
      padding: 20px;
      background: white;
    }
    canvas {
      border: 2px solid #667eea;
      border-radius: 8px;
    }
    button {
      margin-top: 20px;
      padding: 14px 28px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 16px;
    }
    button:hover {
      background: #764ba2;
    }
    .info {
      font-size: 12px;
      color: #999;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🎭 TheAppCabana QR Code</h2>
    <p>For LinkedIn Posts</p>
    <div id="qrcode"></div>
    <button onclick="downloadQR()">📥 Download QR Code</button>
    <div class="info">Right-click → Save image to download<br>Crop and post to LinkedIn</div>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://the-app-cabana-production.up.railway.app",
      width: 400,
      height: 400,
      colorDark: "#667eea",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    function downloadQR() {
      const canvas = document.querySelector('#qrcode canvas');
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/png');
      link.download = 'theappcabana-qr-code.png';
      link.click();
    }
  </script>
</body>
</html>
