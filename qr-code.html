<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheAppCabana QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px 0;
      color: #667eea;
      font-size: 28px;
    }
    p {
      color: #666;
      margin: 0 0 30px 0;
      font-size: 14px;
    }
    #qrcode {
      margin: 0 auto;
      padding: 20px;
      background: white;
    }
    .url {
      margin-top: 20px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 6px;
      font-size: 12px;
      color: #999;
      word-break: break-all;
    }
    .download-btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }
    .download-btn:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎭 TheAppCabana</h1>
    <p>Scan to visit the app store</p>
    <div id="qrcode"></div>
    <div class="url">https://the-app-cabana-production.up.railway.app</div>
    <a href="https://the-app-cabana-production.up.railway.app" class="download-btn">Visit Store</a>
  </div>

  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://the-app-cabana-production.up.railway.app",
      width: 300,
      height: 300,
      colorDark: "#667eea",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
